          - 数据清洗: ai/data/cleaning.md
          - 数据采集:
              - 总览: ai/data/collection/index.md
              - requests: ai/data/collection/requests.md
          - 数据存储: ai/data/storage.md
      - 模型训练:
          - 总览: ai/training/index.md
          - batch: ai/training/batch.md
          - learning rate: ai/training/learning_rate.md
          - 残差网络: ai/training/residual_network.md
