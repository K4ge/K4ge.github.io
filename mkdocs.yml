site_name: Kage Notes
site_url: https://k4ge.github.io/
site_description: Kage 的知识站
site_author: Kage

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue grey
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - scheme: slate
      primary: black
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - AI学习:
      - 总览: ai/index.md
      - 数学基础:
          - 总览: ai/math/index.md
          - 线性代数:
              - 总览: ai/math/linear_algebra/index.md
              - 向量: ai/math/linear_algebra/vector.md
              - 矩阵: ai/math/linear_algebra/matrix.md
              - 特征值: ai/math/linear_algebra/eigenvalue.md
          - 微积分:
              - 总览: ai/math/calculus/index.md
              - 导数: ai/math/calculus/derivative.md
              - 链式法则: ai/math/calculus/chain_rule.md
          - 概率统计: ai/math/probability_statistics.md
          - 信息论: ai/math/information_theory.md
      - 深度学习:
          - 总览: ai/deep_learning/index.md
          - 神经网络基础:
              - 总览: ai/deep_learning/neural_network/index.md
              - 前向传播: ai/deep_learning/neural_network/forward.md
              - 反向传播: ai/deep_learning/neural_network/backward.md
              - loss函数: ai/deep_learning/neural_network/loss.md
              - 激活函数: ai/deep_learning/neural_network/activation.md
              - 线性层: ai/deep_learning/neural_network/linear.md
          - CNN:
              - 总览: ai/deep_learning/cnn/index.md
